name: Issue — Welcome & Label

on:
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Apply user-replied label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['user-replied']
            });

      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;
            const repoName = context.repo.repo;

            const body = [
              `Hey @${author}, the farm manager has your report. 🚜`,
              ``,
              `Thanks for opening this issue — @TheCodingDad-TisonK has been notified and will review it as soon as possible.`,
              ``,
              `**Before the HR department can investigate, please confirm:**`,
              ``,
              `- [ ] You are running the latest version of Worker Costs (visible in the mod manager)`,
              `- [ ] Your issue includes the relevant \`[WorkerCosts]\` lines from \`log.txt\``,
              `  - Log location: \`Documents/My Games/FarmingSimulator2025/log.txt\``,
              `  - Search for \`[WorkerCosts]\` and paste the relevant section here`,
              `- [ ] If this involves a specific worker type or wage calculation — note the worker type, expected cost, and what was actually charged`,
              `- [ ] You have searched [existing issues](https://github.com/${context.repo.owner}/${repoName}/issues) for a similar report`,
              ``,
              `> **Note:** Issues without a log snippet are difficult to investigate and may be closed. Wage calculation bugs in particular require log data to trace.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
