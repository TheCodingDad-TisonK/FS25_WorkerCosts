name: Compatibility Report
description: This mod conflicts with or behaves incorrectly alongside another mod.
labels: ["compatibility", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when FS25_WorkerCosts causes or experiences problems specifically because of another mod being loaded at the same time.

        If the issue happens without any other mods loaded, use the Bug Report template instead.

  - type: input
    id: mod_version
    attributes:
      label: Realistic Worker Costs Version
      placeholder: "e.g. 1.0.6.0"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: Farming Simulator 25 Version
      placeholder: "e.g. 1.4.0.0"
    validations:
      required: true

  - type: input
    id: other_mod
    attributes:
      label: Conflicting Mod Name
      description: Exact name as shown in the mod manager or modDesc.xml.
      placeholder: "e.g. FS25_SomeOtherMod"
    validations:
      required: true

  - type: input
    id: other_mod_version
    attributes:
      label: Conflicting Mod Version
      placeholder: "e.g. 1.2.1.0"
    validations:
      required: true

  - type: input
    id: other_mod_source
    attributes:
      label: Where did you get the conflicting mod?
      description: ModHub, GitHub link, or other source. Helps us check the exact version.
      placeholder: "https://github.com/..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What is the conflict?
      description: Describe exactly what goes wrong. Wrong values? Crash? Features from one mod disabling the other? Be specific.
      placeholder: "When FS25_SomeOtherMod is loaded, worker cost deductions are applied twice per pay period."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to trigger the conflict reliably.
      placeholder: |
        1. Load both mods
        2. Start a new game
        3. Hire a worker
        4. Wait for pay period — costs deducted twice
    validations:
      required: true

  - type: textarea
    id: isolation
    attributes:
      label: Isolation Test
      description: Did you confirm the issue disappears when the conflicting mod is removed? This is important — without this step we cannot tell which mod is the source.
      placeholder: "Yes — removing the other mod makes worker cost deductions correct."
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Log Snippet
      description: Paste all `[Worker Costs]` lines from your log.txt, plus any errors in the same session. Include the full stack trace if there is one.
      render: text
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
    validations:
      required: false
