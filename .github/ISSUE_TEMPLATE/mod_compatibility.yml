name: Mod Compatibility Issue
description: Report a conflict or incompatibility with another mod
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template if Worker Costs is conflicting with another mod — unexpected behavior, errors in log, or one mod overriding the other.

  - type: input
    id: mod_version
    attributes:
      label: Worker Costs Version
      placeholder: "e.g. 1.0.2.0"
    validations:
      required: true

  - type: input
    id: conflicting_mod
    attributes:
      label: Conflicting Mod
      description: Name and version of the mod that conflicts
      placeholder: "e.g. FS25_SomeOtherMod v2.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happens?
      description: Describe the conflict — wrong charges, broken UI, errors, etc.
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Relevant Log Output
      description: Paste any relevant lines from `log.txt`
      render: text
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Workaround (if any)
      description: Have you found a way to make both mods work together?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: The issue only occurs when both mods are active
          required: true
        - label: I searched existing issues and this hasn't been reported yet
          required: true
