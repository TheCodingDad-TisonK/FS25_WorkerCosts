name: Feature Request
description: Suggest an idea or improvement for the mod
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Please check existing issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is there something currently missing or frustrating?
      placeholder: "It's frustrating that all workers cost the same regardless of what vehicle they're using..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your idea
      description: What would you like to see added or changed?
      placeholder: "A per-vehicle-type wage multiplier so combine drivers cost more than tractor drivers..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other ways this could be solved?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would improve my experience significantly
        - I can't enjoy the mod without it
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested yet
          required: true
